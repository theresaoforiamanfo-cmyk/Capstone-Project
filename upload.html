<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload a wallpaper</title>
    <link rel="stylesheet" href="upload.css">
</head>
<body>
<a href="landingPage.html" class="back-link"> <span class="back-text">&#10094;Back to Homepage</span></a>
<div class="container">
    
    <h1>Upload a Wallpaper</h1>
    <form>
        <label>Select an image to upload:</label>
        <input type="file">

        <p>Choose a category:</p>
        <div class="category-group">
            <label class="category-option"><input type="radio" name="cat"> Nature</label><br>
            <label class="category-option"><input type="radio" name="cat"> Abstract</label><br>
            <label class="category-option"><input type="radio" name="cat"> City</label><br>
            <label class="category-option"><input type="radio" name="cat"> Space</label><br>
            <label class="category-option"><input type="radio" name="cat"> Minimal</label><br>
            <label class="category-option"><input type="radio" name="cat"> Animals</label><br>
            <label class="category-option"><input type="radio" name="cat"> Oceans</label><br>
            <label class="category-option"><input type="radio" name="cat"> Mountains</label><br>    
            <label class="category-option"><input type="radio" name="cat"> Deserts</label><br>
            </div>

        <button type="submit">Upload</button>
    </form>
</div>

    
</body>
</html>
